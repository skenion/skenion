name: Release Train Conductor

on:
  workflow_dispatch:
    inputs:
      train_version:
        description: Lockstep product version, such as 0.44.0
        required: true
        default: 0.44.0
        type: string
      mode:
        description: Prepare, publish, or verify the train
        required: true
        default: prepare
        type: choice
        options:
          - prepare
          - publish
          - verify
      manifest_ref:
        description: Manifest path in this repository
        required: true
        default: releases/trains/0.44.0.json
        type: string

permissions:
  contents: read
  actions: write

concurrency:
  group: release-train-${{ inputs.train_version }}
  cancel-in-progress: false

env:
  SKENION_CI_REF: v1

jobs:
  validate:
    name: Validate train inputs
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.validate.outputs.mode }}
      train_id: ${{ steps.validate.outputs.train_id }}
      train_version: ${{ steps.validate.outputs.train_version }}
      manifest_ref: ${{ steps.validate.outputs.manifest_ref }}
    steps:
      - name: Check out conductor state
        uses: actions/checkout@v4

      - name: Validate manifest and release train inputs
        id: validate
        env:
          MODE: ${{ inputs.mode }}
          TRAIN_VERSION: ${{ inputs.train_version }}
          MANIFEST_REF: ${{ inputs.manifest_ref }}
        shell: bash
        run: |
          set -euo pipefail

          case "${MODE}" in
            prepare|publish|verify) ;;
            *)
              echo "Unsupported mode: ${MODE}" >&2
              exit 1
              ;;
          esac

          if [[ ! "${TRAIN_VERSION}" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "train_version must be registry-compatible SemVer like 0.44.0" >&2
            exit 1
          fi

          if [[ "${MANIFEST_REF}" = /* || "${MANIFEST_REF}" == *".."* ]]; then
            echo "manifest_ref must be a repository-relative manifest path" >&2
            exit 1
          fi

          if [[ ! -f "${MANIFEST_REF}" ]]; then
            echo "manifest not found: ${MANIFEST_REF}" >&2
            exit 1
          fi

          train_id="${TRAIN_VERSION%.*}"
          export EXPECTED_TRAIN_ID="${train_id}"

          node <<'NODE'
          const fs = require("fs");

          const manifestRef = process.env.MANIFEST_REF;
          const trainVersion = process.env.TRAIN_VERSION;
          const trainId = process.env.EXPECTED_TRAIN_ID;
          const manifest = JSON.parse(fs.readFileSync(manifestRef, "utf8"));

          const expectedComponents = ["contracts", "runtime", "sdk", "studio", "examples", "docs"];
          const requiredTopLevel = [
            "schema",
            "schema-version",
            "train-id",
            "train-version",
            "protocol-baselines",
            "capability-set",
            "components",
            "release-gates",
          ];
          const legacyFieldNames = new Set([
            "schemaVersion",
            "trainId",
            "trainVersion",
            "protocolBaselines",
            "capabilitySet",
            "protocolSurfaces",
            "runtimeHttp",
            "runtimeCollaboration",
            "sessionAddressing",
            "eventReplay",
            "multiWindow",
            "connectionProfiles",
            "operationLog",
            "ioDiscovery",
            "authPolicy",
            "graphEditor",
            "patchLibrary",
            "livingHelp",
            "graphClipboard",
            "desktopShell",
            "packageDiscovery",
            "packageInstall",
            "packageUpdate",
            "extensionPackages",
            "versionedPaths",
            "pagesDeployment",
            "latestPromotionRequiresMatrix",
            "patchReleasesUseMajorMinorPath",
            "supportTier",
            "assetName",
            "sizeBytes",
            "desktopPackages",
            "runtimeSidecars",
            "releaseGates",
            "registryPackages",
            "contractsNpm",
            "contractsCrate",
            "sdkNpm",
            "runtimeCrate",
            "studioWeb",
            "studioDesktop",
            "githubReleaseAssets",
            "checksumVerification",
            "artifactIds",
            "expectedChecksums",
            "runtimeSmoke",
            "studioPackageSmoke",
            "examplesConformance",
            "docsPagesDeployment",
            "evidenceUrl",
            "pagesUrl",
            "manualVersion",
            "manualPath",
            "desktopPackageArtifactId",
            "runtimeSidecarArtifactId",
          ]);

          function fail(message) {
            console.error(message);
            process.exit(1);
          }

          function pathLabel(path) {
            return path.length === 0 ? "manifest" : `manifest.${path.join(".")}`;
          }

          function requireObject(value, label) {
            if (!value || typeof value !== "object" || Array.isArray(value)) {
              fail(`${label} must be an object`);
            }
            return value;
          }

          function requireString(value, label) {
            if (typeof value !== "string" || value.trim() === "") {
              fail(`${label} must be a non-empty string`);
            }
            return value;
          }

          function requireSemver(value, label) {
            requireString(value, label);
            if (!/^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$/.test(value)) {
              fail(`${label} must be registry-compatible SemVer`);
            }
          }

          function requireEquals(actual, expected, label) {
            if (actual !== expected) {
              fail(`${label} must be ${expected}`);
            }
          }

          function requireField(object, field, label) {
            if (!Object.hasOwn(object, field)) {
              fail(`${label}.${field} is required`);
            }
            return object[field];
          }

          function assertNoLegacyKeys(value, path = []) {
            if (Array.isArray(value)) {
              value.forEach((item, index) => assertNoLegacyKeys(item, [...path, String(index)]));
              return;
            }

            if (!value || typeof value !== "object") {
              if (typeof value === "string" && value.includes("echovisionlab")) {
                fail(`${pathLabel(path)} contains stale echovisionlab repository text`);
              }
              return;
            }

            for (const [key, child] of Object.entries(value)) {
              if (legacyFieldNames.has(key)) {
                fail(`${pathLabel([...path, key])} uses a legacy camelCase field; use the kebab-case release-train schema`);
              }
              assertNoLegacyKeys(child, [...path, key]);
            }
          }

          function assertNoField(object, field, label, reason) {
            if (object && typeof object === "object" && Object.hasOwn(object, field)) {
              fail(`${label}.${field} is not valid for the current v0 release train: ${reason}`);
            }
          }

          function validateRegistryPackage(value, label, ecosystem, name) {
            const pkg = requireObject(value, label);
            requireEquals(pkg.ecosystem, ecosystem, `${label}.ecosystem`);
            requireEquals(pkg.name, name, `${label}.name`);
            requireEquals(pkg.version, trainVersion, `${label}.version`);
            if (Object.hasOwn(pkg, "url") && pkg.url !== null) {
              requireString(pkg.url, `${label}.url`);
            }
          }

          requireObject(manifest, "manifest");
          assertNoLegacyKeys(manifest);

          for (const field of requiredTopLevel) {
            requireField(manifest, field, "manifest");
          }

          requireEquals(manifest.schema, "skenion.release-train", "manifest.schema");
          requireEquals(manifest["schema-version"], "0.1.0", "manifest.schema-version");
          requireEquals(manifest["train-id"], trainId, "manifest.train-id");
          requireEquals(manifest["train-version"], trainVersion, "manifest.train-version");
          requireSemver(manifest["train-version"], "manifest.train-version");

          requireObject(manifest["protocol-baselines"], "manifest.protocol-baselines");
          requireObject(manifest["capability-set"], "manifest.capability-set");
          requireObject(manifest.components, "manifest.components");
          requireObject(manifest["release-gates"], "manifest.release-gates");

          if (Array.isArray(manifest.components)) {
            fail("manifest.components must use the current object shape, not an array");
          }

          for (const component of expectedComponents) {
            requireObject(manifest.components[component], `manifest.components.${component}`);
          }

          validateRegistryPackage(manifest.components.contracts.npm, "manifest.components.contracts.npm", "npm", "@skenion/contracts");
          validateRegistryPackage(manifest.components.contracts.crate, "manifest.components.contracts.crate", "crates.io", "skenion-contracts");
          validateRegistryPackage(manifest.components.sdk.npm, "manifest.components.sdk.npm", "npm", "@skenion/sdk");

          assertNoField(
            manifest.components.runtime,
            "crate",
            "manifest.components.runtime",
            "Runtime is distributed as GitHub Release binaries, not a crates.io package"
          );
          assertNoField(
            manifest.components.studio,
            "web",
            "manifest.components.studio",
            "Studio web is a web/static artifact, not an npm package"
          );
          assertNoField(
            manifest.components.studio,
            "desktop",
            "manifest.components.studio",
            "Studio desktop is a GitHub Release artifact, not an npm package"
          );

          requireObject(manifest.components.runtime.binaries, "manifest.components.runtime.binaries");
          requireObject(manifest.components.studio["desktop-packages"], "manifest.components.studio.desktop-packages");
          requireObject(manifest.components.studio["runtime-sidecars"], "manifest.components.studio.runtime-sidecars");
          requireObject(manifest.components.studio["web-bundle"], "manifest.components.studio.web-bundle");

          requireString(manifest.components.examples.repository, "manifest.components.examples.repository");
          requireEquals(manifest.components.examples.version, trainVersion, "manifest.components.examples.version");
          requireString(manifest.components.examples.tag, "manifest.components.examples.tag");

          const manual = requireObject(manifest.components.docs.manual, "manifest.components.docs.manual");
          requireEquals(manual.version, trainVersion, "manifest.components.docs.manual.version");
          requireEquals(manual.path, `/manual/${trainId}/`, "manifest.components.docs.manual.path");
          requireString(manual["pages-url"], "manifest.components.docs.manual.pages-url");

          const registryGates = requireObject(manifest["release-gates"]["registry-packages"], "manifest.release-gates.registry-packages");
          for (const gate of ["contracts-npm", "contracts-crate", "sdk-npm"]) {
            requireObject(registryGates[gate], `manifest.release-gates.registry-packages.${gate}`);
          }
          for (const gate of ["runtime-crate", "studio-web", "studio-desktop"]) {
            assertNoField(
              registryGates,
              gate,
              "manifest.release-gates.registry-packages",
              "only importable libraries publish registry packages in the current train"
            );
          }

          console.log(`Validated kebab-case conductor manifest ${manifestRef} for train ${trainId} (${trainVersion}).`);
          NODE

          {
            echo "mode=${MODE}"
            echo "train_id=${train_id}"
            echo "train_version=${TRAIN_VERSION}"
            echo "manifest_ref=${MANIFEST_REF}"
          } >> "${GITHUB_OUTPUT}"

  workflow-library:
    name: Check skenion-ci reusable workflows
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
      reason: ${{ steps.check.outputs.reason }}
    steps:
      - name: Check skenion-ci v1 compatibility
        id: check
        env:
          SKENION_CI_REF: ${{ env.SKENION_CI_REF }}
        shell: bash
        run: |
          set -euo pipefail

          base_url="https://raw.githubusercontent.com/skenion/skenion-ci/${SKENION_CI_REF}"
          tmp_dir="$(mktemp -d)"
          reason=""

          for workflow in validate-train-manifest.yml dispatch-release-please.yml verify-release-artifacts.yml; do
            if ! curl -fsSL "${base_url}/.github/workflows/${workflow}" -o "${tmp_dir}/${workflow}"; then
              reason="skenion/skenion-ci@${SKENION_CI_REF} does not expose .github/workflows/${workflow}; publish the v1 reusable workflow tag before running the conductor."
              break
            fi
          done

          if [[ -z "${reason}" ]] && ! curl -fsSL "${base_url}/scripts/lib/manifest.mjs" -o "${tmp_dir}/manifest.mjs"; then
            reason="skenion/skenion-ci@${SKENION_CI_REF} does not expose scripts/lib/manifest.mjs; publish the v1 reusable workflow tag before running the conductor."
          fi

          if [[ -z "${reason}" ]] && ! grep -q '"schema-version"' "${tmp_dir}/manifest.mjs"; then
            reason="skenion/skenion-ci@${SKENION_CI_REF} does not yet support the kebab-case release train manifest. Retag v1 after the kebab-case validator lands in skenion-ci."
          fi

          if [[ -n "${reason}" ]]; then
            echo "ready=false" >> "${GITHUB_OUTPUT}"
            echo "reason=${reason}" >> "${GITHUB_OUTPUT}"
            echo "::warning::${reason}"
            exit 0
          fi

          echo "ready=true" >> "${GITHUB_OUTPUT}"
          echo "reason=skenion/skenion-ci@${SKENION_CI_REF} is ready for the current kebab-case conductor manifest." >> "${GITHUB_OUTPUT}"

  validate-manifest:
    name: Validate train manifest
    if: ${{ needs.workflow-library.outputs.ready == 'true' }}
    needs:
      - validate
      - workflow-library
    uses: skenion/skenion-ci/.github/workflows/validate-train-manifest.yml@v1
    with:
      manifest: ${{ needs.validate.outputs.manifest_ref }}
      manifest-ref: ${{ github.sha }}
      train-version: ${{ needs.validate.outputs.train_version }}
      mode: ${{ needs.validate.outputs.mode }}

  plan:
    name: Prepare train plan
    runs-on: ubuntu-latest
    if: ${{ always() && needs.validate.result == 'success' && needs.workflow-library.result == 'success' && (needs.workflow-library.outputs.ready != 'true' || needs.validate-manifest.result == 'success') }}
    needs:
      - validate
      - workflow-library
      - validate-manifest
    steps:
      - name: Summarize conductor plan
        env:
          MODE: ${{ needs.validate.outputs.mode }}
          TRAIN_ID: ${{ needs.validate.outputs.train_id }}
          TRAIN_VERSION: ${{ needs.validate.outputs.train_version }}
          MANIFEST_REF: ${{ needs.validate.outputs.manifest_ref }}
          WORKFLOW_LIBRARY_READY: ${{ needs.workflow-library.outputs.ready }}
          WORKFLOW_LIBRARY_REASON: ${{ needs.workflow-library.outputs.reason }}
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "## Release Train ${TRAIN_VERSION}"
            echo
            echo "- Mode: ${MODE}"
            echo "- Train id: ${TRAIN_ID}"
            echo "- Manifest: ${MANIFEST_REF}"
            echo "- Conductor: skenion/skenion"
            echo "- Workflow library: skenion/skenion-ci@${SKENION_CI_REF}"
            echo
            echo "Release order:"
            echo "1. Contracts"
            echo "2. Runtime"
            echo "3. SDK"
            echo "4. Studio"
            echo "5. Examples"
            echo "6. Docs"
            echo
            echo "Prepare mode validates the checked-in manifest and summarizes the plan."
            echo "Publish mode dispatches train Release Please PR workflows for Contracts, Runtime, SDK, and Studio."
            echo "Examples conformance and Docs Pages promotion are post-release gates handled during verify/release completion."
            echo "Verify mode is a separate post-release gate after release PRs are merged and artifacts exist."
            if [[ "${WORKFLOW_LIBRARY_READY}" != "true" ]]; then
              echo
              echo "### Blocked"
              echo
              echo "${WORKFLOW_LIBRARY_REASON}"
              echo
              echo "This conductor remains pinned to skenion/skenion-ci@${SKENION_CI_REF}; publish or retag that reusable workflow library before running prepare/publish/verify."
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

  workflow-library-unavailable:
    name: Fail when skenion-ci v1 is unavailable
    if: ${{ needs.workflow-library.outputs.ready != 'true' }}
    runs-on: ubuntu-latest
    needs:
      - validate
      - workflow-library
      - plan
    steps:
      - name: Report blocked reusable workflow library
        env:
          WORKFLOW_LIBRARY_REASON: ${{ needs.workflow-library.outputs.reason }}
        shell: bash
        run: |
          set -euo pipefail
          echo "::error::${WORKFLOW_LIBRARY_REASON}"
          exit 1

  publish-contracts:
    name: Dispatch Contracts release
    if: ${{ needs.workflow-library.outputs.ready == 'true' && needs.validate.outputs.mode == 'publish' }}
    needs:
      - validate
      - workflow-library
      - validate-manifest
      - plan
    uses: skenion/skenion-ci/.github/workflows/dispatch-release-please.yml@v1
    with:
      target-repo: skenion/skenion-contracts
      train-version: ${{ needs.validate.outputs.train_version }}
      mode: publish
      dry-run: false
    secrets: inherit

  publish-runtime:
    name: Dispatch Runtime release
    if: ${{ needs.workflow-library.outputs.ready == 'true' && needs.validate.outputs.mode == 'publish' }}
    needs:
      - validate
      - workflow-library
      - validate-manifest
      - publish-contracts
    uses: skenion/skenion-ci/.github/workflows/dispatch-release-please.yml@v1
    with:
      target-repo: skenion/skenion-runtime
      train-version: ${{ needs.validate.outputs.train_version }}
      mode: publish
      dry-run: false
    secrets: inherit

  publish-sdk:
    name: Dispatch SDK release
    if: ${{ needs.workflow-library.outputs.ready == 'true' && needs.validate.outputs.mode == 'publish' }}
    needs:
      - validate
      - workflow-library
      - validate-manifest
      - publish-runtime
    uses: skenion/skenion-ci/.github/workflows/dispatch-release-please.yml@v1
    with:
      target-repo: skenion/skenion-sdk
      train-version: ${{ needs.validate.outputs.train_version }}
      mode: publish
      dry-run: false
    secrets: inherit

  publish-studio:
    name: Dispatch Studio release
    if: ${{ needs.workflow-library.outputs.ready == 'true' && needs.validate.outputs.mode == 'publish' }}
    needs:
      - validate
      - workflow-library
      - validate-manifest
      - publish-sdk
    uses: skenion/skenion-ci/.github/workflows/dispatch-release-please.yml@v1
    with:
      target-repo: skenion/skenion-studio
      train-version: ${{ needs.validate.outputs.train_version }}
      mode: publish
      dry-run: false
    secrets: inherit

  verify:
    name: Verify release train
    if: ${{ needs.workflow-library.outputs.ready == 'true' && needs.validate.outputs.mode == 'verify' }}
    needs:
      - validate
      - workflow-library
      - validate-manifest
      - plan
    uses: skenion/skenion-ci/.github/workflows/verify-release-artifacts.yml@v1
    with:
      manifest: ${{ needs.validate.outputs.manifest_ref }}
      manifest-ref: ${{ github.sha }}
      train-version: ${{ needs.validate.outputs.train_version }}
    secrets: inherit
